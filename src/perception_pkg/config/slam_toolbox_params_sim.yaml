# Gazebo Classic 仿真建图：关闭闭环，避免接近起点/终点时误闭环导致 map 双墙漂移
slam_toolbox:
  ros__parameters:

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.05
    restamp_tf: true
    min_laser_range: 0.2
    max_laser_range: 12.0
    minimum_time_interval: 0.1
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.15
    check_min_dist_and_heading_precisely: true
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.06
    link_scan_maximum_distance: 2.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 12
    loop_match_maximum_variance_coarse: 2.5
    loop_match_minimum_response_coarse: 0.50
    loop_match_minimum_response_fine: 0.55

    correlation_search_space_dimension: 1.0
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.8
    angle_variance_penalty: 1.5

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.698
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.65
    minimum_distance_penalty: 0.35
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
