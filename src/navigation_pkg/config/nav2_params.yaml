bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    # 标准 BT：规划失败/卡住时 Spin+重规划（比仅 goal 更新更稳）
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    costmap_update_timeout: 1.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    enable_stamped_cmd_vel: false
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 25.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 1.57

    # DWB：禁止倒车；允许原地/弧线转向
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.30
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.30
      min_speed_theta: 0.0
      acc_lim_x: 1.2
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.2
      decel_lim_y: 0.0
      decel_lim_theta: -1.5
      vx_samples: 28
      vy_samples: 1
      vtheta_samples: 28
      sim_time: 2.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.08
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["Oscillation", "ObstacleFootprint", "BaseObstacle", "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint.scale: 0.12
      BaseObstacle.scale: 0.18
      PathAlign.scale: 14.0
      PathAlign.forward_point_distance: 0.35
      PathDist.scale: 14.0
      GoalDist.scale: 18.0
      Oscillation.scale: 12.0
      Oscillation.oscillation_reset_dist: 0.10
      Oscillation.oscillation_reset_angle: 0.35

    # 备用：RPP（先转向再走）
    FollowPath_rpp:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.28
      lookahead_dist: 0.70
      min_lookahead_dist: 0.50
      max_lookahead_dist: 0.95
      lookahead_time: 1.8
      rotate_to_heading_angular_vel: 0.55
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 0.55
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.35
      regulated_linear_scaling_min_speed: 0.08
      allow_reversing: false
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.45
      max_angular_accel: 1.2
      max_robot_pose_search_dist: 10.0
      use_interpolation: true

    # 旧 DWB 参数块（已合并到 FollowPath）
    FollowPath_dwb_legacy:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.34
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.34
      min_speed_theta: 0.0
      acc_lim_x: 1.2
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.2
      decel_lim_y: 0.0
      decel_lim_theta: -1.5
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 24
      sim_time: 1.6
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.12
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.08
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.2
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.2
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

    # 旧 RPP 参数块（已合并到 FollowPath）
    FollowPath_rpp_legacy:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.24
      lookahead_dist: 0.85
      min_lookahead_dist: 0.60
      max_lookahead_dist: 1.00
      lookahead_time: 2.0
      rotate_to_heading_angular_vel: 0.35
      transform_tolerance: 0.8
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.10
      approach_velocity_scaling_dist: 0.45
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.45
      regulated_linear_scaling_min_speed: 0.06
      allow_reversing: false
      use_rotate_to_heading: true
      max_angular_accel: 0.8
      max_robot_pose_search_dist: 10.0
      use_interpolation: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.12, 0.10], [0.12, -0.10], [-0.12, -0.10], [-0.12, 0.10]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 小半径 + 陡衰减：代价贴近障碍，少向贴墙航点方向扩散
        inflation_radius: 0.32
        cost_scaling_factor: 5.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.12, 0.10], [0.12, -0.10], [-0.12, -0.10], [-0.12, 0.10]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.32
        cost_scaling_factor: 5.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    costmap_update_timeout: 2.0
    # 默认：SmacPlanner2D（差速/四驱友好，内置路径平滑；BT 仍用 planner_id=GridBased）
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.20
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 6.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
    # 备用：NavFn 栅格规划（恢复时把 planner_plugins 改为 ["GridBased_navfn"] 并同步 BT planner_id）
    GridBased_navfn:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    enable_stamped_cmd_vel: false
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
      backup_dist: 0.40
      backup_speed: 0.18
      time_allowance: 12.0
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.75
    min_rotational_vel: 0.20
    rotational_acc_lim: 1.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    stamp_smoothed_velocity_with_smoothing_time: false
    enable_stamped_cmd_vel: false
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.30, 0.0, 1.0]
    min_velocity: [0.0, 0.0, -1.0]
    max_accel: [0.8, 0.0, 1.8]
    max_decel: [-0.8, 0.0, -1.8]
    odom_topic: /odom
    odom_duration: 0.2
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    state_topic: collision_monitor_state
    transform_tolerance: 0.5
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: false
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: local_costmap/published_footprint
      time_before_collision: 1.4
      simulation_time_step: 0.1
      min_points: 4
      visualize: false
      enabled: false
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      min_height: 0.0
      max_height: 2.0
      enabled: true
